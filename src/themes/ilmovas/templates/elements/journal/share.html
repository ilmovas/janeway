{% load i18n %}
{% url 'article_view' 'id' article.pk as article_path %}{% with request.scheme|add:"://"|add:request.get_host|add:article_path as share_url %}
<div class="bg-white border border-border-rule gold-border-top p-5">
  <h3 class="text-xs font-bold tracking-widest text-gold uppercase mb-4 flex items-center gap-2">
    <span class="material-symbols-outlined text-sm">share</span>
    {% trans 'مشاركة' %}
  </h3>

  <!-- Copy URL -->
  <div class="flex border border-border-rule overflow-hidden mb-3">
    <input id="share-link"
           type="text"
           value="{{ share_url }}"
           readonly
           dir="ltr"
           class="flex-grow px-3 py-2 text-xs bg-ivory-dark outline-none text-left text-text-muted truncate">
    <button onclick="navigator.clipboard.writeText('{{ share_url }}').then(() => { this.innerHTML = '<span class=\'material-symbols-outlined text-sm\'>check</span>'; setTimeout(() => this.innerHTML = '<span class=\'material-symbols-outlined text-sm\'>content_copy</span>', 1500); })"
            class="bg-primary text-white px-3 hover:bg-primary-mid transition-colors flex-shrink-0"
            title="{% trans 'نسخ الرابط' %}">
      <span class="material-symbols-outlined text-sm">content_copy</span>
    </button>
  </div>

  <!-- Social share buttons -->
  <div class="grid grid-cols-2 gap-2">
    <a href="https://twitter.com/intent/tweet?url={{ share_url|urlencode }}&text={{ article.title|striptags|urlencode }}"
       target="_blank" rel="noopener"
       class="flex items-center justify-center gap-2 border border-border-rule py-2 text-xs text-text-soft hover:border-primary hover:text-primary transition-colors">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.26 5.632zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      X / Twitter
    </a>
    <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ share_url|urlencode }}"
       target="_blank" rel="noopener"
       class="flex items-center justify-center gap-2 border border-border-rule py-2 text-xs text-text-soft hover:border-primary hover:text-primary transition-colors">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      LinkedIn
    </a>
    <a href="https://www.facebook.com/sharer/sharer.php?u={{ share_url|urlencode }}"
       target="_blank" rel="noopener"
       class="flex items-center justify-center gap-2 border border-border-rule py-2 text-xs text-text-soft hover:border-primary hover:text-primary transition-colors">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      Facebook
    </a>
    <a href="mailto:?subject={{ article.title|striptags|urlencode }}&body={{ share_url|urlencode }}"
       class="flex items-center justify-center gap-2 border border-border-rule py-2 text-xs text-text-soft hover:border-primary hover:text-primary transition-colors">
      <span class="material-symbols-outlined text-sm">mail</span>
      {% trans 'بريد إلكتروني' %}
    </a>
  </div>
</div>
{% endwith %}
