<form method="POST">
    {% csrf_token %}
    <div class="section">
        {% if not keyword %}
            {{ form.article_search.errors }}
            <label for="{{ form.article_search.id_for_label }}">{% trans "Search titles, keywords, and authors" %}</label>
            {{ form.article_search }}
        {% else %}
            {% trans 'أنت تتصفح حسب الكلمة المفتاحية' %}.
            <a href="{% url 'search' %}">{% trans 'ابحث عن مقال' %}.</a>
        {% endif %}
    </div>
    <div class="section">
        <label for="{{ form.sort.id_for_label }}">{% trans "Sort articles by" %}</label>
        {{ form.sort.errors }}
        {{ form.sort }}
    </div>
    <div class="section">
        <button type="submit" class="button">{% trans "Filter" %}</button>
    </div>
</form>
